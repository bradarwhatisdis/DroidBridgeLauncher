---
# =============================================================================
# DroidBridge Launcher — Debug Build Workflow
# =============================================================================
# Builds an unsigned debug APK on every push to main and every pull request.
# Uploads the APK as a workflow artifact for quick testing.
#
# Prerequisites (not in this repo — you must provide them):
#   - settings.gradle.kts (or .gradle)     — project-level Gradle settings
#   - app/build.gradle.kts  (or .gradle)   — app module Gradle build config
#   - build.gradle.kts      (or .gradle)   — root project Gradle build file
#   - AndroidManifest.xml                  — app/src/main/AndroidManifest.xml
#
# The Gradle wrapper JAR and properties are already in gradle/wrapper/.
# The gradlew script is generated by the `gradle wrapper` command.
# =============================================================================

name: Debug Build

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - master

env:
  # Target JDK version (must match the Gradle/AGP requirement)
  JDK_VERSION: 17

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up JDK
      # ------------------------------------------------------------------
      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}

      # ------------------------------------------------------------------
      # 3. Set up Android SDK
      # ------------------------------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Customise cmdline-tools version if needed (default = latest)
          cmdline-tools-version: latest

      # ------------------------------------------------------------------
      # 4. Accept Android licenses (required for SDK manager)
      # ------------------------------------------------------------------
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      # ------------------------------------------------------------------
      # 5. Verify Gradle wrapper is present; generate gradlew if missing
      # ------------------------------------------------------------------
      - name: Setup Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            echo "gradlew not found — generating from gradle-wrapper.jar ..."
            # The wrapper jar must already exist in gradle/wrapper/
            java -jar gradle/wrapper/gradle-wrapper.jar --gradle-version "$(cat gradle/wrapper/gradle-wrapper.properties | grep distributionUrl | sed 's/.*gradle-//; s/-bin.zip//' | tr -d '\\n')"
            chmod +x gradlew
          else
            echo "gradlew found"
            chmod +x gradlew
          fi

      # ------------------------------------------------------------------
      # 6. Cache Gradle dependencies (improves build speed)
      # ------------------------------------------------------------------
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ------------------------------------------------------------------
      # 7. Build debug APK
      # ------------------------------------------------------------------
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ------------------------------------------------------------------
      # 8. Upload APK artifact
      # ------------------------------------------------------------------
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DroidBridgeLauncher-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
