---
# =============================================================================
# DroidBridge Launcher — Debug Build Workflow
# =============================================================================
# Builds an unsigned debug APK on every push to main and every pull request.
# Uploads the APK as a workflow artifact for quick testing.
#
# PojavLauncher dependency via git submodule (libraries/PojavLauncher).
# =============================================================================

name: Debug Build

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - master

env:
  # Target JDK version (must match the Gradle/AGP requirement)
  JDK_VERSION: 17

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout source with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # ------------------------------------------------------------------
      # 2. Set up JDK
      # ------------------------------------------------------------------
      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}

      # ------------------------------------------------------------------
      # 3. Set up Android SDK
      # ------------------------------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Customise cmdline-tools version if needed (default = latest)
          cmdline-tools-version: latest

      # ------------------------------------------------------------------
      # 4. Accept Android licenses (required for SDK manager)
      # ------------------------------------------------------------------
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      # ------------------------------------------------------------------
      # 5. Generate gradlew script (wrapper JAR present but missing Main-Class)
      #    Base64-encoded to avoid heredoc/YAML indentation conflicts.
      #    Decoded content is a standard Gradle wrapper launcher script.
      # ------------------------------------------------------------------
      - name: Generate gradlew script
        run: |
          if [ ! -f gradlew ]; then
            echo '' | base64 -d > gradlew
            chmod +x gradlew
            echo "gradlew generated"
          else
            chmod +x gradlew
            echo "gradlew already exists"
          fi

      # ------------------------------------------------------------------
      # 6. Cache Gradle dependencies (improves build speed)
      # ------------------------------------------------------------------
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ------------------------------------------------------------------
      # 7. Build debug APK
      # ------------------------------------------------------------------
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ------------------------------------------------------------------
      # 8. Upload APK artifact
      # ------------------------------------------------------------------
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DroidBridgeLauncher-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
